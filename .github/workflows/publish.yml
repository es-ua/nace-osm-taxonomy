name: Publish

# Trigger: push of a semver tag like v1.11.0
# What it does:
#   - Validates the taxonomy
#   - Regenerates taxonomy.jsonld and verifies it's in sync with per-category files
#   - Verifies VERSION file matches tag
#   - Creates a GitHub Release with taxonomy.jsonld + context.jsonld as assets
#   - Publishes to npm if NPM_TOKEN secret is set (otherwise logs a warning)
#
# Before first publish:
#   - Register the @mapko scope on npmjs.com
#   - Create npm Automation token with Publish rights
#   - Add as GitHub Secret named NPM_TOKEN

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Hoist NPM_TOKEN to job-level env so the step-level `if:` can read it.
    # When unset, publish is gracefully skipped.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate taxonomy
        run: node scripts/validate.mjs

      - name: Regenerate taxonomy.jsonld
        run: node scripts/build-jsonld.mjs

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION file
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
          files: |
            taxonomy.jsonld
            context.jsonld
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Warn if NPM_TOKEN missing
        if: env.NPM_TOKEN == ''
        run: |
          echo "::warning::NPM_TOKEN secret is not set — skipping npm publish."
          echo "::warning::GitHub Release was created. To enable npm publish:"
          echo "::warning::  1. Register the @mapko scope on npmjs.com"
          echo "::warning::  2. Create an npm Automation token with Publish rights"
          echo "::warning::  3. Add it as GitHub Secret named NPM_TOKEN"

      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --access public
