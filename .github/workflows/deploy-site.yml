name: Deploy taxonomy.mapko.net

# Builds the per-node JSON-LD publication from the categories/ source in
# THIS repo and deploys to Cloudflare Pages. Lives alongside publish.yml
# (npm publish on v* tag) — they don't overlap.
#
# Place this file at .github/workflows/deploy-site.yml in the
# es-ua/nace-osm-taxonomy repo.
#
# Triggers:
#   - push to main when the taxonomy data, the site itself, or the
#     workflow file change
#   - manual workflow_dispatch
#
# Secrets required in es-ua/nace-osm-taxonomy repo settings:
#   CLOUDFLARE_API_TOKEN    — token with "Pages:Edit" permission
#   CLOUDFLARE_ACCOUNT_ID   — Cloudflare account id
#
# Project / domain setup (one-time, in Cloudflare dashboard):
#   Pages project: taxonomy-mapko-net
#   Custom domain: taxonomy.mapko.net → CNAME taxonomy-mapko-net.pages.dev

on:
  push:
    branches: [main]
    paths:
      - 'categories/**'
      - 'context.jsonld'
      - 'VERSION'
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install site deps (none right now, kept for forward compat)
        run: npm install --no-save

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=taxonomy-mapko-net --branch=main
          workingDirectory: site
